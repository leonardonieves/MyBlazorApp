<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Setup Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .check-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f9f9f9;
            border-left: 5px solid #ddd;
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .check-item.success {
            background: #d4edda;
            border-left-color: #28a745;
        }
        
        .check-item.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        
        .check-item.loading {
            background: #e7f3ff;
            border-left-color: #0066cc;
        }
        
        .icon {
            font-size: 1.5em;
            margin-right: 15px;
            min-width: 30px;
            text-align: center;
        }
        
        .text {
            flex: 1;
        }
        
        .label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }
        
        .description {
            font-size: 0.9em;
            color: #666;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 150px;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #764ba2;
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
        }
        
        .console-log {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.4;
        }
        
        .log-line {
            margin-bottom: 5px;
        }
        
        .log-success { color: #28a745; }
        .log-error { color: #dc3545; }
        .log-info { color: #0066cc; }
        .log-warn { color: #ffc107; }
        
        .summary {
            background: #e7f3ff;
            border: 2px solid #0066cc;
            border-radius: 5px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .summary h3 {
            color: #0066cc;
            margin-bottom: 10px;
        }
        
        .summary p {
            color: #333;
            margin-bottom: 8px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Stripe Setup Verification</h1>
        <p class="subtitle">Checking if everything is configured correctly...</p>
        
        <div id="checks"></div>
        
        <div class="button-group">
            <button class="btn-primary" onclick="runAllChecks()">Run All Checks</button>
            <button class="btn-secondary" onclick="clearLogs()">Clear Logs</button>
        </div>
        
        <div class="console-log" id="console">
            <div class="log-line log-info">Ready. Click "Run All Checks" to begin...</div>
        </div>
        
        <div class="summary" id="summary" style="display: none;">
            <h3>✅ Summary</h3>
            <p id="summary-text"></p>
        </div>
    </div>

    <script>
        const checks = [
            {
                name: 'Stripe.js Loaded',
                test: () => typeof Stripe !== 'undefined',
                description: 'Check if Stripe.js library is loaded'
            },
            {
                name: 'Window Object Available',
                test: () => typeof window !== 'undefined',
                description: 'Check if window object is accessible'
            },
            {
                name: 'redirectToCheckout Function',
                test: () => typeof window.redirectToCheckout === 'function',
                description: 'Check if payment redirect function exists'
            },
            {
                name: 'checkStripeExists Function',
                test: () => typeof window.checkStripeExists === 'function',
                description: 'Check if Stripe verification function exists'
            },
            {
                name: 'XMLHttpRequest Available',
                test: () => typeof XMLHttpRequest !== 'undefined',
                description: 'Check if AJAX requests are available'
            },
            {
                name: 'Fetch API Available',
                test: () => typeof fetch !== 'undefined',
                description: 'Check if Fetch API is available'
            }
        ];

        function log(message, type = 'info') {
            const console = document.getElementById('console');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${type.toUpperCase()}] ${message}`;
            console.appendChild(line);
            console.scrollTop = console.scrollHeight;
        }

        function clearLogs() {
            document.getElementById('console').innerHTML = '';
            document.getElementById('summary').style.display = 'none';
        }

        function createCheckElement(check, result) {
            const div = document.createElement('div');
            div.className = `check-item ${result ? 'success' : 'error'}`;
            div.innerHTML = `
                <div class="icon">${result ? '✅' : '❌'}</div>
                <div class="text">
                    <span class="label">${check.name}</span>
                    <span class="description">${check.description}</span>
                </div>
            `;
            return div;
        }

        async function runAllChecks() {
            clearLogs();
            const checksContainer = document.getElementById('checks');
            checksContainer.innerHTML = '';
            
            log('Starting verification...', 'info');
            
            let passedChecks = 0;
            const results = [];

            for (const check of checks) {
                try {
                    log(`Testing: ${check.name}...`, 'info');
                    const result = check.test();
                    results.push({ check, result });
                    
                    if (result) {
                        log(`✅ PASSED: ${check.name}`, 'success');
                        passedChecks++;
                    } else {
                        log(`❌ FAILED: ${check.name}`, 'error');
                    }
                    
                    checksContainer.appendChild(createCheckElement(check, result));
                } catch (err) {
                    log(`❌ ERROR in ${check.name}: ${err.message}`, 'error');
                    checksContainer.appendChild(createCheckElement(check, false));
                }
                
                // Small delay for visual effect
                await new Promise(resolve => setTimeout(resolve, 300));
            }

            // Summary
            log(`\nVerification complete: ${passedChecks}/${checks.length} checks passed`, passedChecks === checks.length ? 'success' : 'warn');
            
            if (passedChecks === checks.length) {
                log('🎉 All systems go! You should be able to make payments.', 'success');
                document.getElementById('summary-text').innerHTML = `
                    <strong>✅ Everything looks good!</strong><br>
                    All required components are loaded and configured.<br>
                    <br>
                    You should now be able to:<br>
                    1. Go to /stripe-checkout<br>
                    2. Fill in the payment form<br>
                    3. Click "Proceed to Payment"<br>
                    4. Complete payment on Stripe
                `;
            } else {
                log('⚠️ Some checks failed. See details above.', 'warn');
                document.getElementById('summary-text').innerHTML = `
                    <strong>⚠️ Some issues found</strong><br>
                    Check the failures above and fix them.<br>
                    <br>
                    Common issues:<br>
                    • Reload the page (Ctrl+R)<br>
                    • Use a different browser<br>
                    • Check your internet connection
                `;
            }
            
            document.getElementById('summary').style.display = 'block';
        }

        // Automatically run checks when page loads
        window.addEventListener('load', () => {
            log('Page loaded. Ready for verification.', 'success');
        });
    </script>
</body>
</html>
